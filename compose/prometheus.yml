# Prometheus config consumed by the full-stack docker-compose.yml.
# Exporter is reached via docker network DNS (`gpon-exporter:8114`),
# not the host's loopback.

global:
  # Matches the exporter's default --interval (300s). Scraping faster
  # than the fetch interval just re-reads the same gauges; harmless
  # but pointless. Bump in tandem with --interval if you change it.
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: gpon

scrape_configs:
  - job_name: gpon_exporter
    static_configs:
      - targets: ['gpon-exporter:8114']

  # Scrape Prometheus itself so the dashboard's "process_*" panels
  # (open FDs, RSS) have data even when looking at the collector's own
  # health row. Optional; remove if you find the noise distracting.
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
