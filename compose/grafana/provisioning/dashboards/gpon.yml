apiVersion: 1

# Provider config: tell Grafana where to find the JSON dashboards. The
# dashboard-provision init service writes the substituted dashboard
# into the named volume mounted at /var/lib/grafana/dashboards.
#
# allowUiUpdates=false means edits in the Grafana UI to this dashboard
# are persisted only until the next reload (every 30s by default), at
# which point the provisioned copy wins. To iterate on the dashboard,
# edit dashboard.json in the repo and `docker compose restart grafana`.
providers:
  - name: gpon
    orgId: 1
    folder: ''
    type: file
    disableDeletion: true
    allowUiUpdates: false
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
