services:
  gpon-exporter:
    build: .
    image: gpon-exporter:latest
    container_name: gpon-exporter
    restart: unless-stopped
    ports:
      # Bind to 127.0.0.1 on the host so /metrics is reachable from the
      # host's Prometheus but not from the wider network. Change to
      # "8114:8114" for an all-interfaces bind.
      - "127.0.0.1:8114:8114"
    env_file: .env
    # bind-address must be 0.0.0.0 *inside* the container so the port
    # mapping above can reach the listener; the host-side binding above
    # is what controls reachability.
    command: >
      --device ${ONU_DEVICE}
      --webserver-port 8114
      --bind-address 0.0.0.0
    mem_limit: 128m
    cpus: 0.5
