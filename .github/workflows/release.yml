name: Release

# Builds the multi-arch container image and pushes it to ghcr.io
# whenever a v*.*.* tag is created. Tags only -- ordinary pushes to
# main go through ci.yml (lint, test, build smoke) which does not push.
#
# Workflow is also exposed via workflow_dispatch so a release can be
# rebuilt without recutting the tag (e.g. base image security update).

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.1.0). Only used by manual runs.'
        required: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gpon-exporter
          # Tag with the full version (1.1.0), the major.minor (1.1), and
          # latest. The major-only tag (e.g. "1") is intentionally skipped
          # to avoid accidental cross-major moves on a tag bump.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          # buildkit cache lives in the GHA cache; subsequent tag builds
          # re-use unchanged layers (paramiko/cryptography wheels are the
          # heavy ones).
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/gpon-exporter
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
