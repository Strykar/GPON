[pytest]
# The parser tests share the global prometheus_client REGISTRY: each test
# writes to and reads from the same gauges, and several tests assert on
# values written by prior tests in the same file (the alarm-transition
# test in particular needs ordered execution). Pin pytest order to file
# order so a future randomization plugin can't silently destabilise.
#
# Why not the "real" fix (per-test CollectorRegistry()): the metrics are
# created at module import time as module-level Gauge('gpon_temperature
# _celsius', ...) etc. Switching to per-test registries means refactoring
# every metric declaration into an init_metrics(registry) function and
# threading the registry through every handler. That's a non-trivial diff
# for a test suite that passes 68/68 today, with zero user-visible value.
# The pin is honest about what the trade is and acceptable indefinitely.
# Revisit only if a randomization-induced failure actually shows up.
addopts = -p no:randomly
